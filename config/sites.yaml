sites:
  - id: "cushman_fr_insights"
    enabled: true
    base_url: "https://www.cushmanwakefield.com"
    listing:
      # cette URL n'est pas utilisée directement pour le listing HTML,
      # mais tu peux la laisser pour cohérence, le vrai listing se fait
      # via SEARCH_URL dans l'adapter.
      url: "https://www.cushmanwakefield.com/fr-fr/france/insights"
      pagination:
        type: "json_offset" # ou ce que tu veux, l'adapter gère lui-même la pagination
        param: "firstResult"
        start: 0
        max_pages: 50
    selectors:
      item_link: "" # non utilisé, iter_item_urls fait le job
      title: "h1"
      content: "div.page-content-body, article"
    pdf:
      link_selectors: []
    adapter: "scraper.adapters.cushman_fr_insights:CushmanFrInsightsAdapter"
  - id: "banque_france"
    enabled: true
    base_url: "https://www.banque-france.fr"
    listing:
      url: "https://www.banque-france.fr/liste-actualites"
      pagination:
        type: "page_param"
        param: "page"
        start: 1
        max_pages: 10
    selectors:
      item_link: "article .node-title a"
      title: "h1"
    pdf:
      link_selectors:
        - "a[href$='.pdf']"
    adapter: "scraper.adapters.banque_france:BanqueFranceAdapter"
  - id: "leaseo"
    enabled: true
    base_url: "https://www.leaseo.fr"
    listing:
      url: "https://www.leaseo.fr/actualitesMore"
      pagination:
        type: "json_offset"
        param: "offset"
        start: 0
        max_pages: 50
    selectors:
      item_link: "" # non utilisé (API JSON)
      title: "section.blocTitre h1"
      content: "section.blocContenu"
    pdf:
      link_selectors:
        - "a[href$='.pdf']"
    adapter: "scraper.adapters.leaseo:LeaseoAdapter"
